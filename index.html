<!-- =====================================================
GAUNTLET ENGINE — MASTER TEMPLATE

READ BEFORE EDITING:

This file is divided into TWO zones:

1. SAFE TO EDIT (Customization)
   - Question banks
   - Boss names/images
   - Text (wizard, areas, artifacts)
   - Visual themes

2. DO NOT TOUCH (Core Engine)
   - Adaptive logic
   - Question selection system

<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
    
<!-- Title can be changed to whatever the game needs -->
<title>The Archives of Microeconomics</title>
   
<style>
/* =========================================
   1. VISUAL DESIGN — SAFE TO EDIT

You can change:
- Colors
- Background images
- Fonts
- Glow effects

Do NOT rename IDs (#gameBox, #mazeTrack, etc.)
or you will break JavaScript connections.
========================================= */
body {
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 0;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    color: white;
    background: linear-gradient(rgba(2,6,23,.8), rgba(2,6,23,.8)), url('question_background_image.jpeg');
    background-size: cover;
    background-position: center;
    background-attachment: scroll;
}
   
#gameShell{
    display:flex;
    gap:20px;
    max-width:900px;
    width:100%;
    margin:0 auto;
}
   
.dungeon-container {
    position: relative;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 40px;
    width: 100%;
    max-width: 1100px;
    margin-top: 20px;
}

/* =========================================
   2. CORE GAME CONTAINER (#gameBox) — SAFE TO STYLE
=========================================

This is the main gameplay panel.

Controls:
- size and layout of the game area
- background styling and effects
- visual feedback (glow, boss mode, hit effects)
- positioning of UI elements (autosave, etc.)

-----------------------------------------
SAFE TO EDIT:
- colors, shadows, glow effects
- padding, margins
- background / blur effects
- border styles
- animation intensity

-----------------------------------------
USE CAUTION:
- width / max-width / flex settings
- position: relative (needed for overlays like autosave)
- removing box-sizing may break layout

-----------------------------------------
DO NOT REMOVE:
- #gameBox selector (used throughout JS)
- .boss-mode class (boss visuals tied to logic)
- .hit class (damage feedback)

-----------------------------------------
TIP:
This controls how the game FEELS visually.
You can restyle it completely—just keep structure intact.

========================================= */
#gameBox {
    max-width: 750px;
    flex:1;
    min-width:0;
    width:100%;
    min-height: auto;
    margin: 0;
    padding: 18px 20px;
    text-align: center;
    background: rgba(15,23,42,0.98);
    backdrop-filter: blur(6px);
    border-radius: 14px;
    box-sizing: border-box;
    box-shadow: 0 0 10px rgba(212,175,55,0.6), 0 0 20px rgba(212,175,55,0.5), 0 0 40px rgba(212,175,55,0.3);
    border: 1px solid rgba(255,255,255,0.05);
    animation: torchFlicker 6s infinite;
    transition: box-shadow .3s ease;
    position: relative;
}

/* Boss state styling — triggered during boss fights (DO NOT REMOVE) */
#gameBox.boss-mode {
    border: 2px solid #60a5fa;
    box-shadow: 0 0 40px rgba(96,165,250,0.4);
}

/* Damage effect when boss/player is hit (visual feedback) */
.hit { box-shadow: 0 0 60px #ef4444, inset 0 0 40px #7f1d1d !important; animation: hitshake 0.4s ease; }

/* Autosave indicator — positioned relative to gameBox */
#autosave { position: absolute; top: 15px; right: 15px; font-size: 11px; opacity: 0.5; font-style: italic; }

/* =========================================
   3. TEXT & TYPOGRAPHY SYSTEM — SAFE TO CUSTOMIZE
=========================================
Controls all text styling in the game:
- question readability
- headers and titles
- boss emphasis text
- hints and feedback
- visual hierarchy
-----------------------------------------
SAFE TO EDIT:
- font sizes
- colors
- text shadows
- spacing (margin, line-height)
- stylistic effects (italic, uppercase, etc.)
-----------------------------------------
USE CAUTION:
- extreme font sizes (may break layout)
- removing margins (can cause overlap)
- removing contrast (hurts readability)
-----------------------------------------
DO NOT REMOVE:
- #question (core content display)
- .boss-title (boss transitions)
- .boss-q (boss summaries)
- .fade-out-text (feedback animation)
-----------------------------------------
TIP:
Prioritize readability over style.
If students can’t read it quickly, the system fails.
========================================= */
h2 { text-shadow: 0 0 10px rgba(255,255,255,0.3), 0 0 20px rgba(251,191,36,0.2); margin-bottom: 5px; }

/* Main question text — keep readable and centered */
#question { font-size: clamp(20px, 4vw, 22px); line-height: 1.4; font-weight: 600; margin: 14px 0; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }

/* Boss/summary title — high emphasis text */
.boss-title { font-size: 28px; font-weight: bold; margin-bottom: 15px; display: block; }

/* Area/zone label — subtle contextual info */
.area-title { color: #9ca3af; font-size: 14px; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 15px; }

/* Boss summary text — left-aligned for readability */
.boss-q {font-style: italic; font-size: 24px; border-left: 4px solid var(--bossColor); padding-left: 15px; margin: 20px 0; text-align: left;}

/* Optional hint display (calculation or guidance) */
.hint-box { font-size: 13px; color: #fbbf24; margin-top: 15px; opacity: 0.8; height: 18px; }
    
/* Temporary feedback text (auto fades out) */
.fade-out-text { animation: fadeOut 5s forwards; font-weight: bold; color: #4ade80; }

/* =========================================
   4. BUTTONS & INTERACTION — SAFE TO CUSTOMIZE
=========================================
Controls all interactive elements:
- answer buttons
- hover/active feedback
- layout of answer choices
- utility buttons (fullscreen, etc.)
-----------------------------------------
SAFE TO EDIT:
- colors, backgrounds, borders
- hover/active effects (scale, glow, etc.)
- padding, spacing, font sizes
- button shapes (border-radius)
-----------------------------------------
USE CAUTION:
- removing hover/active effects (reduces feedback)
- extreme sizing (can break layout or overlap)
- flex settings in .answers (affects layout)
-----------------------------------------
DO NOT REMOVE:
- button selector (used globally)
- .answers layout (controls answer positioning)
-----------------------------------------
TIP:
Buttons should feel responsive and clickable.
Visual feedback = better engagement.
========================================= */

/* Base button styling — applies to all buttons */
button {
    padding: 12px 22px; margin: 6px; font-size: 16px; cursor: pointer;
    background: #374151; color: white; border: none; border-radius: 8px; transition: all 0.2s ease;
}

/* Hover feedback — improves interactivity */
button:hover { background: #4b5563; transform: translateY(-2px); }

/* Click feedback — simulates button press */
button:active {transform: scale(0.96);}

/* Answer container — controls layout of choices */
.answers { display: flex; flex-direction: column; justify-content: center; gap: 12px; width: 100%}

/* Individual answer buttons — flexible sizing */
.answers button { flex: 1 1 100%; min-height: 60px; max-width: 100%; padding: 15px; font-size: 18px; margin: 0; }

/* Utility button (fullscreen toggle) — safe to restyle or move */
.fullscreenBtn { position: absolute; top: 12px; left: 12px; background: #374151; color: white; border: none; padding: 6px 10px; border-radius: 6px; cursor: pointer; font-size: 12px; }

/* =========================================
   5. PROGRESS & MAZE TRACK — SAFE TO CUSTOMIZE (WITH RULES)
=========================================
Controls visual progression feedback:
- progress bar (top fill indicator)
- maze track (30-room grid)
- current position highlight
- boss room visual cues
-----------------------------------------
SAFE TO EDIT:
- colors, gradients, glow effects
- sizes (maze-box, spacing, gap)
- animation styles (pulse, transitions)
- grid sizing (with care)
-----------------------------------------
USE CAUTION:
- grid-template-columns (affects layout structure)
- maze-box size vs spacing (can cause overflow)
- removing animations (reduces feedback clarity)
-----------------------------------------
DO NOT MODIFY:
- #mazeTrack structure (10 columns × 3 rows = 30 rooms)
- nth-child(10, 20, 30) unless boss rooms are changed globally

Changing boss room visuals here requires matching updates in:
- game logic (boss triggers)
- progression system
-----------------------------------------
TIP:
This system gives players a sense of movement and progress.
If it's unclear, motivation drops.
========================================= */
    
/* Progress bar container — background track */
#progressBar { width: 100%; height: 22px; background: #2d3748; border-radius: 12px; margin-bottom: 20px; overflow: hidden; }
    
/* Progress fill — width controlled by JS */
#progressFill { height: 100%; width: 0%; background: linear-gradient(90deg, #f59e0b, #ef4444); transition: width 0.4s ease; }

/* Maze grid layout — 10 columns = 30 total rooms */
#mazeTrack { display: grid; grid-template-columns: repeat(10, 36px); justify-content: center; gap: 10px; margin: 25px auto; }
    
/* Individual room cell — default state */
.maze-box { width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; font-size: 20px; border-radius: 6px; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); transition: all 0.3s ease; }

/* Current room highlight — animated pulse */
.maze-box.active { background: rgba(212,175,55,0.2); border: 2px solid #d4af37; z-index: 10; animation: activePulse 1s infinite alternate;}

/* Boss room highlights (10, 20, 30) — visual only */
.maze-box:nth-child(10) { text-shadow: 0 0 10px #60a5fa; }
.maze-box:nth-child(20) { text-shadow: 0 0 12px #a855f7; }
.maze-box:nth-child(30) { text-shadow: 0 0 15px #ef4444; }
/* =========================================
   6. ARTIFACT SYSTEM (REWARDS) — SAFE TO CUSTOMIZE
=========================================
Controls visual display of rewards:
- artifact drop popup (after boss wins)
- artifact vault (persistent collection)
- locked vs unlocked states
- reward animations and glow effects
-----------------------------------------
SAFE TO EDIT:
- colors, backgrounds, borders
- artifact sizes and spacing
- glow effects and animations
- text labels and styling
-----------------------------------------
USE CAUTION:
- opacity (controls locked vs unlocked visibility)
- transform/scale (can affect layout spacing)
- animation timing (too fast = distracting)
-----------------------------------------
DO NOT MODIFY:
- .artifactSlot.unlocked (linked to JS unlock logic)
- element IDs (#artifactDrop, #artifactVault, etc.)
- display behavior (used for showing/hiding rewards)

Changing these may break:
- artifact unlocking visuals
- vault persistence feedback
-----------------------------------------
TIP:
This is your reward system.
If it doesn’t feel rewarding, engagement drops.
========================================= */
    
/* Reward popup — appears after boss victory */
#artifactDrop { margin-top: 20px; padding: 14px; background: rgba(15,23,42,.6); border-radius: 10px; border: 1px solid rgba(99,102,241,.35); text-align: center; }
    
/* Artifact image in popup */
#artifactImage { width: 96px; margin-bottom: 8px; }
#artifactDrop img { filter: drop-shadow(0 0 12px rgba(56,189,248,.8)); }

/* Persistent artifact collection display (top panel) */
#artifactVault { margin-top: -6px; width: 220px; padding: 18px; border-radius: 12px; background: linear-gradient(180deg,#020617,#020617 60%,#020617 100%); box-shadow: 0 0 25px rgba(56,189,248,.15); border: 1px solid rgba(56,189,248,.25); text-align: center; display:block !important; }
#artifactVault h3 { color: #60a5fa; margin: 0 0 14px 0; }

/* Layout container for artifact slots */
.vaultRow { display: flex; justify-content: center; align-items:flex-end; gap: 15px; flex-wrap:wrap;}

/* Individual artifact slot (default = locked state) */    
.artifactSlot { display: flex; flex-direction: column; align-items: center; justify-content: center; min-width: 70px; text-align:center; opacity: .25; transition: all .4s ease;}

/* Locked artifact image (grayscale effect) */    
.artifactSlot img { width: 45px; margin-bottom:4px;filter: grayscale(1); transition: all .4s ease; }

/* Unlocked artifact — triggered by JS (DO NOT REMOVE) */    
.artifactSlot span { display: block; font-size: 13px; color: #94a3b8; margin-top: 8px; line-height: 1.2; }

/* Glow + animation for unlocked artifacts */
.artifactSlot.unlocked { opacity: 1; transform: scale(1.05); }
.artifactSlot.unlocked img { filter: drop-shadow(0 0 14px rgba(56,189,248,.9)); animation: relicPulse 3s infinite; }
.artifactSlot.unlocked span { color: #e2e8f0; font-weight: 600; }

/* =========================================
   7. BOSS EFFECTS & ATMOSPHERE — SAFE TO CUSTOMIZE
=========================================
Controls visual intensity and immersion:
- boss animations (floating, shaking)
- boss-specific glow effects
- environmental effects (torches)
-----------------------------------------
SAFE TO EDIT:
- glow colors (match your theme)
- animation intensity and timing
- boss icon size
- torch placement and styling
-----------------------------------------
USE CAUTION:
- removing animations (reduces feedback and immersion)
- extreme sizing (can break layout)
- opacity/filter changes (affects visibility)
-----------------------------------------
DO NOT REMOVE:
- .boss-shake (triggered during boss hits)
- .bossIcon (used for boss rendering)
- .torch (environmental effect tied to game start)

Removing these will:
- eliminate combat feedback
- reduce visual clarity during bosses
-----------------------------------------
TIP:
This section controls how "intense" the game feels.
Subtle changes here dramatically affect experience.
========================================= */
    
/* Hit animation — triggered when boss takes damage */
.boss-shake {animation: bossShake 0.5s cubic-bezier(.36,.07,.19,.97) both;}

/* Boss image display — includes floating animation */
.bossIcon { width: 96px; height: auto; display: block; margin: 0 auto 12px auto; animation: bossFloat 4s ease-in-out infinite; }

/* Boss-specific glow effects (safe to recolor per theme, change name before glow to match your boss name) */
.tyrantGlow { filter: drop-shadow(0 0 14px rgba(96,165,250,.8)); }
.underwriterGlow { filter: drop-shadow(0 0 14px rgba(168,85,247,.8)); }
.finalBoss { filter: drop-shadow(0 0 18px rgba(239,68,68,.9)); }

/* Ambient torch effect — decorative, shown during gameplay */
.torch { position: absolute; width: 70px; top: 30px; z-index: 10; animation: torchFlicker 3s infinite alternate; pointer-events: none; opacity: .95; filter: drop-shadow(0 0 12px rgba(255,180,80,.7)); display:none; }

/* Torch positioning (left/right sides of screen) */
.left-torch { left: 18px; }
.right-torch { right: 18px; transform: scaleX(-1); }
/* =========================================
   8. FULLSCREEN SCREENS & TRANSITIONS — SAFE TO CUSTOMIZE
=========================================
Controls full-screen UI layers:
- start screen (game entry)
- hallway transition overlay (between rooms)
- transition text display
-----------------------------------------
SAFE TO EDIT:
- background images (start screen, hallway scenes)
- text styling and layout
- overlay colors and opacity
- animation timing and effects
-----------------------------------------
USE CAUTION:
- position: fixed (required for full-screen coverage)
- z-index layering (controls what appears on top)
- opacity / pointer-events (controls visibility + interaction)
-----------------------------------------
DO NOT REMOVE:
- #startScreen (entry point to game)
- #hallwayTransition + .active (transition system)
- #hallwayText (text container)

Removing these will break:
- game start flow
- transition animations
- progression continuity
-----------------------------------------
TIP:
This section controls immersion and pacing between actions.
Good transitions = smoother experience.
========================================= */

/* Fullscreen start screen — shown before game begins */    
#startScreen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: url('start_screen_image.png'); background-size: cover; background-position: center; background-repeat: no-repeat; z-index: 100; display: flex; flex-direction: column; justify-content: center; align-items: center; }

/* Transition overlay — appears between rooms (controlled by JS) */
#hallwayTransition { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(rgba(0,0,0,.7),rgba(0,0,0,.7)), url('hallway1.png'); background-size: cover; background-position: center; display: flex; justify-content: center; align-items: center; text-align: center; color: white; font-size: 26px; z-index: 200; opacity: 0; pointer-events: none; transition: opacity 1.2s ease; animation: hallwayZoom 3.2s ease-out forwards; }

/* Activates transition visibility (DO NOT REMOVE) */    
#hallwayTransition.active { opacity: 1; }

/* Text container for transition messages */
#hallwayText { max-width: 600px; background: rgba(0,0,0,0.55); padding: 30px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.15); box-shadow: 0 0 25px rgba(0,0,0,0.6); }

/* =========================================
   9. ANIMATION SYSTEM — SAFE TO CUSTOMIZE (WITH CARE)
=========================================
Defines all animation keyframes used throughout the game:
- environmental effects (torch flicker)
- combat feedback (hit shake, boss shake)
- progression feedback (active pulse, victory glow)
- character motion (boss float, wizard float)
- reward effects (relic pulse)
- UI transitions (fade in/out)
-----------------------------------------
SAFE TO EDIT:
- animation intensity (scale, movement distance)
- timing (duration in CSS usage, not here)
- visual effects (glow, brightness, shadows)
-----------------------------------------
USE CAUTION:
- transform values (affects layout positioning)
- extreme motion (can feel distracting or chaotic)
- removing animations (reduces feedback clarity)
-----------------------------------------
DO NOT REMOVE:
- keyframe names (used across CSS and JS)
  e.g. torchFlicker, bossShake, activePulse, etc.

Renaming or deleting these will break:
- visual feedback
- boss effects
- UI transitions
-----------------------------------------
TIP:
Animations should reinforce feedback, not distract.
Subtle > excessive.
========================================= */

/* Ambient lighting effect (environmental immersion) */    
@keyframes torchFlicker { 0%, 100% { filter: brightness(1); } 25% { filter: brightness(1.05); } 50% { filter: brightness(0.97); } 75% { filter: brightness(1.04); } }

/* Damage feedback (quick impact effect) */    
@keyframes hitshake { 0% { transform: translateX(0); } 25% { transform: translateX(-8px); } 50% { transform: translateX(8px); } 75% { transform: translateX(-6px); } 100% { transform: translateX(0); } }

/* Boss-specific hit feedback (stronger shake) */    
@keyframes bossShake { 10%, 90% { transform: translate3d(-1px, 0, 0); } 20%, 80% { transform: translate3d(2px, 0, 0); } 30%, 50%, 70% { transform: translate3d(-4px, 0, 0); } 40%, 60% { transform: translate3d(4px, 0, 0); } }

/* Current room highlight animation (maze tracker) */   
@keyframes activePulse { 0% { box-shadow: 0 0 6px rgba(212,175,55,0.7); transform: scale(1.1); } 100% { box-shadow:0 0 10px rgba(212,175,55,0.6), 0 0 20px rgba(212,175,55,0.5),0 0 40px rgba(212,175,55,0.3); ; transform: scale(1.2); } }

/* Victory text animation (end screen emphasis) */    
@keyframes victoryGlow { 0%, 100% { transform: scale(1); text-shadow: 0 0 10px gold; } 50% { transform: scale(1.1); text-shadow: 0 0 25px gold, 0 0 40px orange; } }

/* Idle boss movement (subtle hovering effect) */    
@keyframes bossFloat { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }

/* Artifact glow animation (reward emphasis) */    
@keyframes relicPulse { 0%, 100% { filter: drop-shadow(0 0 8px #38bdf8); } 50% { filter: drop-shadow(0 0 18px #60a5fa); } }

/* Temporary feedback text fade-out */   
@keyframes fadeOut { 0%, 70% { opacity: 1; } 100% { opacity: 0; } }

/* Wizard idle animation (subtle movement) */    
@keyframes wizardFloat{ 0%,100%{ transform:translateY(0); } 50%{ transform:translateY(-5px); }}

/* General UI entrance animation */    
@keyframes fadeIn {from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
   
   
/* =========================================

/* =========================================
   11. BOSS MODE (UI STATE OVERRIDES) — DO NOT MODIFY STRUCTURE
=========================================
Applies layout changes during boss encounters.
Triggered by adding the "boss-mode" class via JavaScript.
Effects:
- hides wizard panel
- centers game content
- adjusts layout for focused boss interaction
-----------------------------------------
SAFE TO EDIT:
- spacing (margin, alignment)
- sizing (max-width adjustments)
- visual styling
-----------------------------------------
DO NOT MODIFY:
- .boss-mode selector
- element targets (#wizardBox, #gameBox, #gameShell)

- boss screen layout
- UI transitions into boss mode
-----------------------------------------
TIP:
Boss mode removes distractions and increases focus.
Keep layout clean and centered.
========================================= */

}

    justify-content:center;
}

/* =========================================
   12. RESPONSIVE DESIGN — MOBILE ADJUSTMENTS
=========================================

Applies layout changes for smaller screens (≤ 600px).

Ensures:
- maze tracker stays visible
- game content fits without overflow
- answer buttons stack vertically

-----------------------------------------
SAFE TO EDIT:
- sizes (maze-box, scaling)
- button layout (flex behavior)
- scale amount for gameBox

-----------------------------------------
USE CAUTION:
- removing transform scaling may cause overflow

function weightedPick(pool){
    let weightedPool = [];
    pool.forEach(q => {
        let weight = 1;
        // Weakness boost
        if(q.tag && conceptMemory[q.tag]){
            weight += Math.min(conceptMemory[q.tag], 2);
        }
        // Coverage boost (if tag not seen recently)
        let recentCount = tagHistory.filter(t => t === q.tag).length;
        if(recentCount === 0){
            weight += 2;
        }
        for(let i = 0; i < weight; i++){
            weightedPool.push(q);
        }
    });
    return weightedPool[Math.floor(Math.random() * weightedPool.length)];
}

function getAdaptiveQuestion(poolName, targetTag = null){
    let pool = questionBanks[poolName];
    // --- 🎯 TARGET SPECIFIC TAG IF PROVIDED ---
    if(targetTag){
        let filtered = pool.filter(q => q.tag === targetTag);

        // Only use filtered if it actually has questions
        if(filtered.length > 0){
            pool = filtered;
        }
    }

    let recent = questionHistory[poolName].slice(-5);
    let available = pool.filter(q => !recent.includes(q.id));
    if(available.length === 0){
        available = pool;
    }
    let picked = weightedPick(available);

    // Track history
    questionHistory[poolName].push(picked.id);
    if(questionHistory[poolName].length > 10){
        questionHistory[poolName].shift();
    }

    // Track tag exposure
    if(picked.tag){
        tagHistory.push(picked.tag);
        if(tagHistory.length > 10){
            tagHistory.shift();
        }
    }
    return picked;
}

{ id:17, q:"A consumer receives a pay raise while prices stay the same. What happens to the budget constraint?",options:["Rotates inward","Shifts outward","Rotates around Y axis","Becomes vertical"],a:1,tag:"budget",type:"interpretation",feedback:"When income increases while prices stay constant, consumers can afford more of both goods. The budget constraint shifts outward in a parallel movement."},
{ id:18, q:"The price of good X falls while income stays the same. What happens to the budget constraint?",options:["Rotates outward on the X-axis","Shifts outward parallel","Rotates inward","Does not change"],a:0,tag:"budget",type:"interpretation",feedback:"A fall in the price of X makes X relatively cheaper. The budget line rotates outward along the X-axis while the Y intercept stays the same."},
{ id:19, q:"A consumer moves to a higher indifference curve after income rises. What does this indicate?",options:["Higher utility","Lower prices","Lower income","Demand collapse"],a:0,tag:"indifference",type:"interpretation",feedback:"Higher indifference curves represent higher levels of utility. More income allows the consumer to reach a more preferred bundle."},
{ id:20, q:"If the price of a good rises and consumers buy less of it, this reflects...",options:["The law of demand","Perfect competition","Elastic supply","Producer surplus"],a:0,tag:"demand",type:"interpretation",feedback:"The law of demand states that as price increases, quantity demanded typically falls, all else equal."},
{ id:21, q:"When the price of coffee rises, many consumers switch to tea. Coffee and tea are...",options:["Substitutes","Complements","Independent goods","Inferior goods"],a:0,tag:"demand",type:"interpretation",feedback:"Substitute goods replace each other. When the price of coffee rises, consumers switch to alternatives like tea."},
{ id:22, q:"If the price of printers rises and fewer people buy ink cartridges, these goods are...",options:["Complements","Substitutes","Inferior goods","Luxury goods"],a:0,tag:"demand",type:"interpretation",feedback:"Complement goods are used together. When printers become more expensive, fewer are purchased, reducing demand for ink cartridges."},
{ id:23, q:"If price falls and total revenue increases, demand must be...",options:["Elastic","Inelastic","Unit elastic","Perfectly inelastic"],a:0,tag:"elasticity",type:"interpretation",feedback:"When demand is elastic, quantity demanded rises proportionally more than price falls, causing total revenue to increase."},
{ id:24, q:"A consumer chooses a bundle where the indifference curve touches the budget line. This bundle...",options:["Maximizes utility","Minimizes spending","Maximizes income","Eliminates scarcity"],a:0,tag:"equilibrium",type:"interpretation",feedback:"Consumer equilibrium occurs where the highest attainable indifference curve is tangent to the budget line."},
{ id:25, q:"If both goods become cheaper while income stays constant, what happens to purchasing power?",options:["It increases","It decreases","It stays the same","It disappears"],a:0,tag:"budget",type:"interpretation",feedback:"When prices fall while income stays constant, consumers can afford more goods. Purchasing power increases."},
{ id:26, q:"If more consumers enter a market while prices stay the same, market demand will...",options:["Increase","Decrease","Stay constant","Become perfectly elastic"],a:0,tag:"demand",type:"interpretation",feedback:"Market demand is the horizontal sum of individual demands. More consumers increase total demand."},
{ id:27, q:"A bundle lies inside the budget constraint but not on the highest indifference curve. This bundle is...",options:["Affordable but not optimal","Impossible","Utility maximizing","Profit maximizing"],a:0,tag:"budget",type:"interpretation",feedback:"Bundles inside the budget constraint are affordable but do not maximize utility because better bundles exist on higher indifference curves."},
{ id:28, q:"If consumers are willing to trade fewer units of good Y for each additional unit of X, this reflects...",options:["Diminishing marginal rate of substitution","Increasing elasticity","Perfect substitutes","Budget rotation"],a:0,tag:"indifference",type:"interpretation",feedback:"Diminishing marginal rate of substitution means consumers give up fewer units of one good as they consume more of the other."},
{ id:29, q:"A demand curve becomes steeper. What can we conclude about elasticity?",options:["It must be more elastic","It must be less elastic","Elasticity cannot be determined from slope alone","Demand becomes unit elastic"],a:2,tag:"elasticity",type:"trap",feedback:"Elasticity depends on both slope and position on the curve. A steeper curve does not automatically mean demand is less elastic."},
{ id:30, q:"A bundle lies on the budget line. This means...",options:["It is affordable but not necessarily optimal","It always maximizes utility","It is outside the budget","It is inefficient"],a:0,tag:"budget",type:"trap",feedback:"Points on the budget line are affordable, but only the point tangent to the highest indifference curve maximizes utility."},
{ id:31, q:"If income increases, demand for an inferior good will...",options:["Decrease","Increase","Stay constant","Become perfectly elastic"],a:0,tag:"demand",type:"trap",feedback:"Inferior goods are purchased less when income rises because consumers shift toward higher-quality alternatives."},
{ id:32, q:"Two indifference curves intersect on a graph. What does this imply?",options:["Preferences are inconsistent","Utility is maximized","Prices changed","Demand increased"],a:0,tag:"indifference",type:"trap",feedback:"Indifference curves cannot intersect. If they did, it would violate the assumption of consistent (transitive) preferences."},
{ id:33, q:"If the price of a good falls, demand has...",options:["Increased","Decreased","Not changed","Become elastic"],a:2,tag:"demand",type:"trap",feedback:"A price change causes a movement along the demand curve, not a shift of the curve. Demand itself has not changed."},

{ id:35, q:"If income increases and a consumer buys more of a good, that good must be...",options:["Normal","Inferior","Elastic","A complement"],a:0,tag:"demand",type:"trap",feedback:"Normal goods are purchased more when income rises. Inferior goods move in the opposite direction."},
{ id:36, q:"If the price of good X changes and the budget line rotates, what stays constant?",options:["Income","Utility","Demand","Preferences"],a:0,tag:"budget",type:"trap",feedback:"When a price changes, the budget line rotates but income remains the same."},
{ id:37, q:"A consumer chooses a bundle inside the budget constraint. What does this mean?",options:["They could afford more but chose not to","They spent all income","The bundle is impossible","Utility is maximized"],a:0,tag:"budget",type:"trap",feedback:"Bundles inside the budget constraint are affordable but do not use all available income."},
{ id:38, q:"If the price of both goods doubles and income also doubles, the budget constraint...",options:["Does not change","Shifts outward","Rotates inward","Becomes vertical"],a:0,tag:"budget",type:"trap",feedback:"If both prices and income double, purchasing power stays the same and the budget constraint remains unchanged."}

hard:[

// ANSWER SHUFFLING — DO NOT MODIFY CORE LOGIC
// =============================================
// Randomizes answer choices while preserving
// the correct answer index.
//
// Steps:
// 1. Copy original question (prevents mutation)
// 2. Store correct answer value
// 3. Shuffle options
// 4. Recalculate correct index (q.a)
//
// ---------------------------------------------
// DO NOT MODIFY:
// - correct answer tracking logic
// - q.a reassignment
// - structure of returned object
//
// Breaking this WILL cause:
// - incorrect answers being marked correct
// - correct answers being marked wrong
//
// ---------------------------------------------
// SAFE TO EDIT:
// - adding extra fields (if needed)
// - minor formatting changes
//
// This function ensures fairness in answer order.
// =============================================   
function shuffleOptions(question){
    let q = {
        q: question.q,
        options: [...question.options],
        a: question.a,
        feedback: question.feedback,
        hint: question.hint,
        tag: question.tag,
        type: question.type
    };

    let correct = q.options[q.a];

    for(let i = q.options.length - 1; i > 0; i--){
        let j = Math.floor(Math.random() * (i + 1));
        [q.options[i], q.options[j]] = [q.options[j], q.options[i]];
    }

    q.a = q.options.indexOf(correct);

    return q;
}

function getMUPerDollar() {
    const mu = Math.floor(Math.random() * 50) + 10;
    const price = [2, 5, 10][Math.floor(Math.random() * 3)];
    return {
        q: `A consumer receives MUx = ${mu} from good X. The price of X is $${price}. What is the Marginal Utility per dollar?`,
        options: [`${(mu/price).toFixed(1)}`, `${mu}`, `${price/mu}`, `${(mu*price)}`],
        a: 0,  type: "calculation", feedback:`MU per dollar = MU / Price = ${mu} / ${price} = ${(mu/price).toFixed(1)}`
    };
}

function getEquilibriumCheck() {
    const muX = Math.floor(Math.random() * 20) + 10;
    const pX = [2, 5][Math.floor(Math.random() * 2)];
    const ratio = muX / pX;
    // We want the student to find the MUy that satisfies MUx/Px = MUy/Py
    const pY = 10;
    const correctMUy = ratio * pY;
    
    return {
        q: `A consumer is in equilibrium. MUx = ${muX} and Px = $${pX}. If the price of Good Y (Py) is $${pY}, what must be the Marginal Utility of Good Y (MUy)?`,
        options: [`${correctMUy}`, `${correctMUy / 2}`, `${correctMUy + 10}`, `${muX}`],
        a: 0,  type: "calculation", feedback:`Consumer equilibrium requires MUx/Px = MUy/Py. ${muX}/${pX} = ${ratio}. So MUy must equal ${correctMUy}.`
    };
}
    
function getElasticityCalc() {

    const p1 = (Math.floor(Math.random() * 5) + 4) * 2;
    const p2 = p1 + 2;

    const q1 = (Math.floor(Math.random() * 5) + 8) * 10;
    const q2 = q1 - 20;

    const chgQ = q2 - q1;
    const midQ = (q1 + q2) / 2;
    const chgP = p2 - p1;
    const midP = (p1 + p2) / 2;

    const elasticityVal = Math.abs((chgQ / midQ) / (chgP / midP));
    const elasticity = elasticityVal.toFixed(2);

    // helper classifier
    function classify(val){
        if (val > 1) return "Elastic";
        if (val < 1) return "Inelastic";
        return "Unit Elastic";
    }

    const correct = `${elasticity} (${classify(elasticityVal)})`;

    const d1Val = elasticityVal * 0.7;
    const d2Val = elasticityVal * 1.3;
    const d3Val = Math.abs((chgQ / q1) / (chgP / p1));

    const d1 = `${d1Val.toFixed(2)} (${classify(d1Val)})`;
    const d2 = `${d2Val.toFixed(2)} (${classify(d2Val)})`;
    const d3 = `${d3Val.toFixed(2)} (${classify(d3Val)})`;

    let options = new Set();
    options.add(correct);
    options.add(d1);
    options.add(d2);
    options.add(d3);

    while (options.size < 4) {
        const fillerVal = Math.random() * 2 + 0.5;
        options.add(`${fillerVal.toFixed(2)} (${classify(fillerVal)})`);
    }

    options = Array.from(options);

return {
    q: `When the price of a good increases from $${p1} to $${p2}, the quantity demanded decreases from ${q1} to ${q2}. A firm raises price expecting to increase revenue. Based on the midpoint elasticity, what actually happens?`,
    options: [
        "Revenue increases because demand is inelastic",
        "Revenue decreases because demand is elastic",
        "Revenue stays the same because demand is unit elastic",
        "Revenue cannot be determined from elasticity"
    ],
    a: elasticityVal > 1 ? 1 : (elasticityVal < 1 ? 0 : 2),
    type: "calculation",
    hint: "Calculate elasticity, then apply the revenue rule",
    feedback: `Elasticity ≈ ${elasticity}. Demand is ${classify(elasticityVal)}, so ${elasticityVal > 1 ? "revenue falls when price rises." : elasticityVal < 1 ? "revenue rises when price rises." : "revenue stays the same."}`
};
}
  
function getConsumerSurplusCalc() {
    const wtp = Math.floor(Math.random() * 20) + 40; // Higher WTP to ensure positive surplus
    const initialPrice = Math.floor(Math.random() * 10) + 20; // e.g., $20 - $30
    const priceDrop = Math.floor(Math.random() * 5) + 5; // e.g., $5 - $10 drop
    const finalPrice = initialPrice - priceDrop;

    // The increase in surplus is the difference between the price points
    // New Surplus (wtp - finalPrice) - Old Surplus (wtp - initialPrice) = initialPrice - finalPrice
    const surplusIncrease = initialPrice - finalPrice;

return {
    q: `A buyer is willing to pay $${wtp} for a product. The price falls from $${initialPrice} to $${finalPrice}. What happens to consumer surplus and why?`,
    options: [
        `It increases by $${surplusIncrease} because the buyer pays less for the same value`,
        `It increases by $${wtp - finalPrice} because total value increases`,
        `It does not change because willingness to pay is fixed`,
        `It decreases because price falls`
    ],
    a: 0,
    type: "calculation",
    feedback: `Consumer surplus increases by the price drop since WTP stays constant while price falls.`
};
}

        ...usedQuestions.easyBoss,
        ...usedQuestions.mediumBoss,
        ...usedQuestions.finalBoss
    ];

    let available = pool.filter(q => !used.includes(q.id));

    if(available.length === 0){
        usedQuestions[poolName] = []
        available = pool
    }

    // Avoid three identical question types in a row
    let filtered = available;
    if (lastTypes.length >= 2) {
        let last1 = lastTypes[lastTypes.length - 1];
        let last2 = lastTypes[lastTypes.length - 2];

        if (last1 === last2) {
            filtered = available.filter(q => q.type !== last1);
            if (filtered.length === 0) filtered = available;
        }
    }

    let question = filtered[Math.floor(Math.random() * filtered.length)];

usedQuestions[poolName].push(question.id)

// Track types
lastTypes.push(question.type)
if(lastTypes.length > 3){
lastTypes.shift()
}

    return question;
}

// =============================================
// RANDOMIZATION SYSTEM — DO NOT MODIFY CORE LOGIC
// =============================================
// Controls fair, non-repeating selection of:
// - calculation generators
// - question pools
//
// Uses "shuffle + bag" system to ensure:
// - no immediate repeats
// - full coverage before reuse
//
// ---------------------------------------------
// SAFE TO EDIT:
// - adding new generators (calculationGenerators)
// - modifying pool content
//
// DO NOT MODIFY:
// - shuffle logic
// - bag system (calcBag, _remaining)
// - pop() usage
//
// Breaking this WILL cause:
// - repeated questions
// - uneven distribution
// - predictable patterns
//
// This ensures randomness WITHOUT repetition.
// =============================================     

// Fisher-Yates shuffle (uniform random order)
// Do not modify — ensures unbiased randomness     
function shuffle(arr){
    for(let i = arr.length - 1; i > 0; i--){
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
}

// Bag system for calculation generators
// Ensures all generators are used before repeating
let calcBag = [];

// Pulls one calculation generator from the bag
// Refills bag when empty (reshuffled)
function pickCalcGenerator(){
    if(calcBag.length === 0){
        calcBag = shuffle([...calculationGenerators]);
    }
    return calcBag.pop();
}

// Generic bag-based random picker for any pool
// Prevents repeats until pool is exhausted
function pickRandom(pool){
    if(!pool._remaining || pool._remaining.length === 0){
        pool._remaining = shuffle([...pool]);
    }
    return pool._remaining.pop();
}

function triggerBossShake() {
    const icon = document.querySelector(".bossIcon");
    const box = document.getElementById("gameBox");

    // Shake the world
    box.classList.remove("boss-shake");
    void box.offsetWidth;
    box.classList.add("boss-shake");

        icon.classList.add("boss-shake");
    }
}

// =============================================
// COMPLETION CODE GENERATOR — DO NOT MODIFY
// =============================================
// This function creates a unique verification code
// based on player performance:
//
// Inputs:
// - name (player)
// - accuracy (% correct)
// - streak (max streak)
// - total (questions answered)
//
// It generates a deterministic hash so that:
// - codes are reproducible
// - codes cannot be easily faked manually
//
// ---------------------------------------------
// DO NOT CHANGE:
// - string structure (name|acc|streak|total|ARCHIVE42)
// - hashing logic
// - return format ("ARCH-...")
//
// Changing this WILL:
// - invalidate all existing completion codes
// - break verification consistency
//
// ---------------------------------------------
// SAFE TO EDIT (if absolutely necessary):
// - "ARCHIVE42" → change only if rebranding ALL codes
// - "ARCH-" prefix → cosmetic only
//
// This is NOT encryption.
// It is a lightweight integrity check.
// =============================================
function generateCode(name, acc, streak, total){
    let str = `${name}|${acc}|${streak}|${total}|ARCHIVE42`;
    let hash = 0;

    for(let i = 0; i < str.length; i++){
        hash = (hash << 5) - hash + str.charCodeAt(i);
        hash |= 0;
    }

    return "ARCH-" + Math.abs(hash).toString(36).toUpperCase();
}

// =============================================
// ARRAY SHUFFLE UTILITY — SAFE TO USE, DO NOT MODIFY
// =============================================
// Fisher-Yates shuffle algorithm.
//
// Used to randomize:
// - question order
// - calculation generators
// - any randomized sequences
//
// DO NOT MODIFY unless you understand:
// - uniform randomness
// - bias in random selection
//
// Breaking this = predictable patterns in questions
// =============================================     
function shuffleArray(arr){
    for(let i=arr.length-1;i>0;i--){ let j=Math.floor(Math.random()*(i+1)); [arr[i],arr[j]]=[arr[j],arr[i]]; }
    return arr;
}     

// =============================================
// HIGH SCORE TRACKING — OPTIONAL FEATURE
// =============================================
// Stores top completion times in browser (localStorage)
//
// - Saves name, time, and date
// - Sorts fastest → slowest
// - Keeps top 5 results only
//
// SAFE TO EDIT:
// - number of scores kept (slice)
// - displayed fields (name/date)
//
// WARNING:
// Clearing browser data will erase scores.
// =============================================
function updateHighScores(newTimeMs) {
    let scores = JSON.parse(localStorage.getItem("gauntletHighScores")) || [];
    scores.push({ name: username, time: newTimeMs, date: new Date().toLocaleDateString() });
    
    // Sort by time (lowest/fastest first) and keep top 5
    scores.sort((a, b) => a.time - b.time);
    scores = scores.slice(0, 5);
    
    localStorage.setItem("gauntletHighScores", JSON.stringify(scores));
    return scores;
}

// =============================================
// TIME FORMATTER — SAFE UTILITY
// =============================================
// Converts milliseconds → readable format (Xm Ys)
//
// Used for:
// - victory screen
// - performance tracking
//
// Safe to modify format if desired.
// =============================================     
function formatTime(ms) {
    let mins = Math.floor(ms / 60000);
    let secs = Math.floor((ms / 1000) % 60);
    return `${mins}m ${secs}s`;
}

// RESULT SHARING — SAFE TO CUSTOMIZE
// =============================================
// Copies player performance summary to clipboard.
//
// Includes:
// - name
// - time
// - accuracy
// - streak
// - verification code
//
// SAFE TO EDIT:
// - text format
// - labels ("Adventurer", etc.)
// - button feedback message
//
// WARNING:
// Requires element IDs:
// - "vCode"
// - "shareBtn"
//
// Removing those will break this function.
// =============================================     
function copyResults() {
    const totalTimeMs = Date.now() - startTime;
    const timeString = formatTime(totalTimeMs);
    const code = document.getElementById("vCode").innerText;
    const accuracy = Math.round((correctAnswers / totalAttempts) * 100);

    const shareText = `Adventurer: ${username}
        Time: ${timeString}
        Accuracy: ${accuracy}%
        Best Streak: ${maxStreak}
        Total Questions: ${totalAttempts}
        Code: ${code}
        Verified by The Archivist`;

    navigator.clipboard.writeText(shareText).then(() => {
        const btn = document.getElementById("shareBtn");
        const originalText = btn.innerText;
        const originalColor = btn.style.background;

        btn.innerText = "✅ Copied!";
        btn.style.background = "#059669";

        setTimeout(() => {
            btn.innerText = originalText;
            btn.style.background = originalColor;
        }, 2000);
    });
}
