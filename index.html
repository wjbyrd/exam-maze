<!DOCTYPE html>
<html>
<head>
<title>The Microeconomics Gauntlet</title>
  
<style>
body{
font-family:Arial;
background:radial-gradient(circle at center, #111827 0%, #020617 80%),
linear-gradient(180deg,#020617,#000000);
color:white;
text-align:center;
margin:0;
padding:0;
}

@keyframes torchFlicker {
0%   { filter: brightness(1); }
25%  { filter: brightness(1.05); }
50%  { filter: brightness(0.97); }
75%  { filter: brightness(1.04); }
100% { filter: brightness(1); }
}
  
#gameBox{
width:750px;
margin:auto;
margin-top:40px;
padding:30px;
background:#111827;
border-radius:14px;
box-shadow: 0 0 40px rgba(0,0,0,0.8), inset 0 0 30px rgba(0,0,0,0.6);
border:1px solid rgba(255,255,255,0.05);
animation: torchFlicker 6s infinite;
}
 
button{
padding:12px 22px; margin:8px; font-size:16px; cursor:pointer;
background:#374151; color:white; border:none; border-radius:8px; transition:all 0.2s ease;
}

button:hover{ background:#4b5563; transform:translateY(-2px); }

h2{ text-shadow: 0 0 10px rgba(255,255,255,0.3), 0 0 20px rgba(251,191,36,0.2); }
  
#mazeTrack{ font-size:22px; line-height:32px; letter-spacing:2px; margin-bottom:10px; display: inline-block; text-shadow:0 0 10px rgba(34,197,94,0.6); }
  
#progressBar{ width:100%; height:22px; background:#2d3748; border-radius:12px; margin-bottom:20px; overflow:hidden; }

#progressFill{ height:100%; width:0%; background:linear-gradient(90deg,#f59e0b,#ef4444); transition:width 0.4s ease; }

.boss{ color:#fbbf24; line-height:1.8; font-weight:bold; font-size:22px; text-shadow:0 0 8px rgba(251,191,36,0.7); }

@keyframes bossFlash { 0% { background:var(--bossColor,#7f1d1d); } 100% { background:#1f2937; } }

@keyframes shake { 0% { transform:translateX(0); } 25% { transform:translateX(-6px); } 50% { transform:translateX(6px); } 75% { transform:translateX(-4px); } 100% { transform:translateX(0); } }

#bossMessage{ color:#f59e0b; font-weight:bold; margin-bottom:8px; text-shadow:0 0 8px rgba(245,158,11,0.6); }
  
.bossFlash{ animation:bossFlash 0.6s ease; }
.shake{ animation:shake 0.4s ease; }

@keyframes victoryGlow { 0% { transform:scale(1); text-shadow:0 0 10px gold; } 50% { transform:scale(1.3); text-shadow:0 0 25px gold,0 0 40px orange; } 100% { transform:scale(1); text-shadow:0 0 10px gold; } }

.victory{ animation:victoryGlow 1s ease-in-out 3; }  
</style>
</head>

<body>
<div id="gameBox">
<h2>The Microeconomics Gauntlet</h2>
  <p id="playerName"></p>
  <p style="opacity:.7;margin-top:-10px;">Battle through consumer theory to prepare for the exam</p>

<div id="progressBar"><div id="progressFill"></div></div>
<div id="mazeTrack"></div>
  
<p id="roomDisplay"></p>
<p id="bossMessage"></p>
<p id="question"></p>
<div id="answers"></div>
<p id="message"></p>
</div>

<script>
// ----- PLAYER PROFILE & SETUP -----
let username = localStorage.getItem("gauntletUser");
if(!username){
    username = prompt("Choose a username for the leaderboard:");
    username = (username || "Player").substring(0,20).replace(/[^a-zA-Z0-9_]/g,"");
    localStorage.setItem("gauntletUser", username);
}

let startTime = Date.now();
let savedRoom = localStorage.getItem("gauntletRoom");
let room = savedRoom ? parseInt(savedRoom) : 1;

if(savedRoom && savedRoom > 1){
    if(!confirm("Resume your previous run at Room " + savedRoom + "?")){
        localStorage.removeItem("gauntletRoom");
        room = 1;
    }
}
  
let currentQuestion;
let usedQuestions = { easy: [], medium: [], hard: [], easyBoss: [], mediumBoss: [], finalBoss: [] };

// ----- RANDOM MATH GENERATORS -----
function rand(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }

function getMUPerDollar() {
    let MU = rand(20, 80); let P = rand(2, 10);
    let correct = Math.round((MU / P) * 10) / 10;
    let options = [correct, Math.round((correct + 1.5) * 10) / 10, Math.round(Math.abs(correct - 1.2) * 10) / 10, Math.round((MU / (P + 1)) * 10) / 10];
    options = shuffleArray([...new Set(options)]);
    while(options.length < 4) { options.push(Math.round(rand(1, 10) * 10) / 10); }
    return { q: `Room 26: If the Marginal Utility (MU) of a good is ${MU} and the price is $${P}, what is the marginal utility per dollar?`, options: options.map(o => o.toString()), a: options.indexOf(correct) };
}


function getOptimalBundle() {
    let Px = rand(2, 6); let Py = rand(2, 6);
    let MUx = rand(12, 36);
    let correctMUy = (MUx / Px) * Py;
    let options = [correctMUy, correctMUy + 4, Math.abs(correctMUy - 6), correctMUy * 2];
    options = shuffleArray([...new Set(options)]);
    while(options.length < 4) { options.push(rand(10, 50)); }
    return { q: `Room 27: A consumer is maximizing utility. If Px = $${Px}, Py = $${Py}, and MUx = ${MUx}, what must MUy be?`, options: options.map(o => o.toString()), a: options.indexOf(correctMUy) };
}


function getConsumerSurplus() {
    let wtp = rand(55, 95); let price = rand(15, 45);
    let correct = wtp - price;
    let options = [correct, wtp, price, wtp + price];
    options = shuffleArray([...new Set(options)]);
    return { q: `Room 28: A buyer is willing to pay $${wtp} for a product but the market price is $${price}. What is the consumer surplus?`, options: options.map(o => o.toString()), a: options.indexOf(correct) };
}

function getElasticity() {
    let pctQ = rand(10, 40); let pctP = rand(5, 20);
    let correct = Math.round((pctQ / pctP) * 100) / 100;
    let options = [correct, Math.round((pctP / pctQ) * 100) / 100, 1.0, 0.5];
    options = shuffleArray([...new Set(options)]);
    return { q: `Room 29: If price changes by ${pctP}% and quantity demanded changes by ${pctQ}%, what is the price elasticity of demand?`, options: options.map(o => o.toString()), a: options.indexOf(correct) };
}

// ----- STATIC QUESTION BANKS -----
const questionBanks = {
easy:[
{q:"A theory of choice assumes individuals...",options:["Make random decisions","Choose the most preferred affordable bundle","Always maximize income","Always minimize work"],a:1},
{q:"Consumer preferences are typically represented using...",options:["Demand curves","Indifference curves","Supply curves","Cost curves"],a:1},
{q:"Indifference curves represent...",options:["Bundles giving equal utility","Bundles giving equal price","Bundles giving equal income","Bundles giving equal production"],a:0},
{q:"If a consumer prefers bundle A to bundle B and B to C, preferences are...",options:["Complete","Transitive","Non-rational","Random"],a:1},
{q:"The slope of the budget constraint reflects...",options:["Relative prices of goods","Income level","Utility level","Demand elasticity"],a:0},
{q:"If income increases, the budget constraint...",options:["Rotates","Shifts outward","Shifts inward","Becomes vertical"],a:1},
{q:"If the price of good X increases, the budget line...",options:["Rotates inward on the X-axis","Shifts outward","Rotates outward","Does not change"],a:0},
{q:"Consumers maximize utility where...",options:["Indifference curve is tangent to budget line","Income is highest","Prices are equal","Demand is highest"],a:0},
{q:"Marginal rate of substitution represents...",options:["Rate consumers trade one good for another","Price ratio","Income ratio","Demand elasticity"],a:0},
{q:"A complete preference ordering means...",options:["Consumers can compare any two bundles","Consumers always prefer cheaper goods","Consumers never change preferences","Consumers prefer equal bundles"],a:0},
{q:"Transitive preferences imply...",options:["If A is preferred to B and B to C, then A is preferred to C","Consumers prefer cheaper goods","Income increases utility automatically","Demand curves shift"],a:0},
{q:"If two bundles lie on the same indifference curve...",options:["They provide equal utility","They cost the same","They contain equal goods","They maximize income"],a:0},
{q:"Indifference curves are typically downward sloping because...",options:["Consumers trade one good for another","Prices fall","Income increases","Demand increases"],a:0},
{q:"Convex indifference curves imply...",options:["Diminishing marginal rate of substitution","Increasing marginal cost","Constant utility","Perfect substitutes"],a:0},
{q:"If the price of good X falls, the budget constraint...",options:["Rotates outward on the X-axis","Shifts outward parallel","Shifts inward","Becomes vertical"],a:0},
{q:"Bundles outside the budget constraint are...",options:["Unaffordable","Optimal","Preferred","Efficient"],a:0},
{q:"Bundles inside the budget constraint are...",options:["Affordable but not utility maximizing","Impossible","Always optimal","Always inefficient"],a:0},
{q:"Utility maximization occurs where...",options:["MRS equals the price ratio","Demand equals supply","Income equals spending","Marginal utility is zero"],a:0},
{q:"If the marginal rate of substitution exceeds the price ratio...",options:["The consumer should consume more of good X","The consumer should consume less of good X","Utility falls","Income changes"],a:0},
{q:"A bundle of goods refers to...",options:["A set of goods a consumer may consume","A firm's production level","Total market demand","A supply schedule"],a:0},
{q:"Utility refers to...",options:["Satisfaction a consumer receives","Total income","Market demand","Firm profit"],a:0},
{q:"The budget constraint shows...",options:["All affordable combinations of goods","Only preferred bundles","Production possibilities","Market equilibrium"],a:0},
{q:"If both goods become cheaper, the budget line...",options:["Shifts outward","Rotates inward","Becomes vertical","Does not change"],a:0},
{q:"A steeper budget line means...",options:["One good has become relatively more expensive","Income increased","Utility increased","Demand increased"],a:0},
{q:"A steeper indifference curve indicates...",options:["Higher willingness to trade Y for X","Lower utility","Higher income","Lower demand"],a:0}
],
medium:[
{q:"An individual demand curve is derived from...",options:["Budget constraints only","Optimal consumption bundles at different prices","Utility levels only","Production functions"],a:1},
{q:"When price falls, the optimal bundle typically moves...",options:["Along the demand curve","Off the demand curve","To a different market","Randomly"],a:0},
{q:"A price change affects consumption through...",options:["Income and substitution effects","Supply effects","Production effects","Random effects"],a:0},
{q:"The substitution effect occurs because...",options:["Relative prices change","Income changes","Preferences change","Demand shifts"],a:0},
{q:"The income effect occurs because...",options:["Purchasing power changes","Relative prices change","Utility disappears","Demand becomes elastic"],a:0},
{q:"If a good is normal, an income increase causes demand to...",options:["Increase","Decrease","Stay constant","Disappear"],a:0},
{q:"If a good is inferior, an income increase causes demand to...",options:["Increase","Decrease","Stay constant","Become vertical"],a:1},
{q:"Demand shifts outward when...",options:["Income rises for a normal good","Price increases","Technology improves","Costs rise"],a:0},
{q:"A demand curve shifts when...",options:["Income or preferences change","Price changes","Supply changes","Markets disappear"],a:0},
{q:"The substitution effect of a price decrease always...",options:["Increases quantity demanded","Decreases quantity demanded","Has no effect","Depends on income"],a:0},
{q:"The income effect of a price decrease for a normal good...",options:["Increases quantity demanded","Decreases quantity demanded","Has no effect","Reduces welfare"],a:0},
{q:"For an inferior good, the income effect of a price decrease...",options:["Reduces quantity demanded","Increases quantity demanded","Is always zero","Creates surplus"],a:0},
{q:"A Giffen good occurs when...",options:["Income effect outweighs substitution effect","Substitution effect dominates","Demand becomes perfectly elastic","Income rises"],a:0},
{q:"If income rises and demand increases, the good is...",options:["Normal","Inferior","Elastic","Substitute"],a:0},
{q:"If the price of coffee rises and demand for tea increases, the goods are...",options:["Substitutes","Complements","Inferior","Normal"],a:0},
{q:"If the price of printers rises and demand for ink falls, the goods are...",options:["Complements","Substitutes","Inferior","Giffen"],a:0},
{q:"The marginal rate of substitution equals...",options:["Slope of the indifference curve","Slope of the budget line","Income divided by price","Demand elasticity"],a:0},
{q:"Consumer equilibrium occurs when...",options:["MRS equals price ratio","Utility is zero","Income is maximized","Demand equals supply"],a:0},
{q:"A normal good is one where...",options:["Demand rises as income rises","Demand falls as income rises","Price always rises","Utility is constant"],a:0},
{q:"An inferior good is one where...",options:["Demand falls as income rises","Price falls with income","Utility decreases","Consumers avoid it"],a:0}
],
hard:[
{q:"Consumer surplus measures...",options:["Difference between willingness to pay and price","Firm profits","Producer costs","Market revenue"],a:0},
{q:"When price falls, consumer surplus typically...",options:["Increases","Decreases","Stays constant","Becomes zero"],a:0},
{q:"Market demand is obtained by...",options:["Summing individual demand curves horizontally","Summing vertically","Multiplying prices","Averaging costs"],a:0},
{q:"Price elasticity of demand measures...",options:["Responsiveness of quantity demanded to price change","Firm profit","Consumer income","Market supply"],a:0},
{q:"If elasticity is greater than 1, demand is...",options:["Elastic","Inelastic","Unitary","Vertical"],a:0},
{q:"If demand is perfectly inelastic...",options:["Quantity demanded does not change with price","Price does not change","Income is constant","Demand disappears"],a:0},
{q:"A price increase reduces consumer surplus because...",options:["Consumers pay more and buy less","Income increases","Costs rise","Supply falls"],a:0},
{q:"Elastic demand implies...",options:["Large quantity response to price change","Small quantity response","No quantity response","Infinite supply"],a:0},
{q:"Market demand becomes flatter when...",options:["More consumers enter the market","Costs rise","Firms exit","Supply shifts"],a:0},
{q:"Price elasticity of demand equals...",options:["Percent change in quantity divided by percent change in price","Price divided by quantity","Demand divided by supply","Income divided by price"],a:0},
{q:"If elasticity equals 1, demand is...",options:["Unit elastic","Perfectly elastic","Inelastic","Vertical"],a:0},
{q:"When demand is elastic, a price decrease will...",options:["Increase total revenue","Decrease total revenue","Leave revenue unchanged","Eliminate demand"],a:0},
{q:"When demand is inelastic, a price increase will...",options:["Increase total revenue","Decrease total revenue","Leave revenue unchanged","Reduce profit"],a:0},
{q:"Consumer surplus represents...",options:["Willingness to pay minus price","Price minus cost","Total revenue","Producer surplus"],a:0},
{q:"A price decrease increases consumer surplus because...",options:["More consumers buy and existing consumers pay less","Income rises","Supply increases","Costs fall"],a:0},
{q:"Market demand is obtained by...",options:["Horizontal summation of individual demands","Vertical summation","Averaging prices","Multiplying quantities"],a:0},
{q:"If the price of X falls, the substitution effect...",options:["Moves consumption toward X","Moves consumption toward Y","Has no effect","Reduces income"],a:0},
{q:"The income effect occurs because...",options:["A price change alters purchasing power","Prices change utility","Consumers prefer cheaper goods","Demand shifts randomly"],a:0},
{q:"For a Giffen good...",options:["Income effect outweighs substitution effect","Demand always rises","Substitution effect dominates","Price has no effect"],a:0}
],
easyBoss:[{q:"Utility maximization occurs where the marginal rate of substitution equals...",options:["Price ratio","Income","Demand","Consumer surplus"],a:0}],
mediumBoss:[{q:"The substitution effect of a price decrease always...",options:["Increases quantity demanded","Decreases quantity demanded","Does nothing","Depends on income"],a:0}],
finalBoss:[{q:"If demand is elastic and price falls, total revenue will...",options:["Increase","Decrease","Stay constant","Become zero"],a:0}]
};

function difficulty(){
    if(room<=9) return "easy";
    if(room==10) return "easyBoss";
    if(room<=19) return "medium";
    if(room==20) return "mediumBoss";
    if(room<=29) return "hard";
    return "finalBoss";
}

function randomQuestion(poolName){
    // CALCULATIONS CORRIDOR: Forces specific randomized questions for 26-29
    if(poolName === "hard"){
        if(room === 26) return getMUPerDollar();
        if(room === 27) return getOptimalBundle();
        if(room === 28) return getConsumerSurplus();
        if(room === 29) return getElasticity();
    }

    let pool = questionBanks[poolName];
    let used = usedQuestions[poolName];
    let available = pool.filter(q => !used.includes(q));
    if(available.length === 0){ usedQuestions[poolName] = []; available = pool; }
    let question = available[Math.floor(Math.random()*available.length)];
    usedQuestions[poolName].push(question);
    return question;
}

function updateProgress(){ document.getElementById("progressFill").style.width=(room/30*100)+"%"; }

function shuffleArray(arr){
    for(let i = arr.length - 1; i > 0; i--){
        let j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
}

function generateCode(){ return "MAZE-" + Math.floor(1000 + Math.random()*9000); }

function updateMazeTrack(){
    let track="";
    for(let i=1;i<=30;i++){
        let icon="⬛";
        if(i === room){ icon="🟥"; }
        else if(i < room){ icon="🟩"; }
        if(i === 10 && i >= room){ icon="⚔ Warden"; }
        else if(i === 20 && i >= room){ icon="👹 Decomposer"; }
        else if(i === 30 && i >= room){ icon="👑 Sovereign"; }
        track += icon + " ";
        if(i % 10 === 0){ track += "<br>"; }
    }
    document.getElementById("mazeTrack").innerHTML = track;
}
  
function loadQuestion(){
    updateProgress(); updateMazeTrack();
    document.getElementById("playerName").innerText = "Adventurer: " + username;
    let diff=difficulty();
    let q=randomQuestion(diff);
    currentQuestion=q;
    document.getElementById("roomDisplay").innerText="Room "+room+" of 30";
    let bossTitle = ""; let bossColor = "";
    if(room === 10){ bossTitle = "⚔ Warden of Indifference"; bossColor = "#fbbf24"; }
    if(room === 20){ bossTitle = "⚔ The Decomposer of Choice"; bossColor = "#a855f7"; }
    if(room === 30){ bossTitle = "👑 Sovereign of Elasticity"; bossColor = "#ef4444"; }

    if(diff.includes("Boss")){
        document.getElementById("bossMessage").innerText = "⚔ A guardian blocks your path...";
        document.getElementById("question").innerHTML = '<span class="boss" style="color:'+bossColor+'">'+bossTitle+'</span><br>'+q.q;
        let box = document.getElementById("gameBox");
        box.style.setProperty('--bossColor', bossColor);
        box.classList.add("bossFlash", "shake");
        setTimeout(()=>{ box.classList.remove("bossFlash", "shake"); },600);
    } else {
        document.getElementById("bossMessage").innerText="";
        document.getElementById("question").innerText=q.q;
    }

    let options = q.options.map((opt,i)=>({text:opt,index:i}));
    options = shuffleArray(options);
    let html="";
    options.forEach((opt)=>{ html+=`<button onclick="answer(${opt.index})">${opt.text}</button>`; });
    document.getElementById("answers").innerHTML=html;
}

function answer(choice){
    let diff=difficulty();
    if(choice===currentQuestion.a){
        if(diff.includes("Boss")){ room++; }
        else {
            let bonusRoll = Math.random();
            if(room < 5) room++;
            else if(room >= 10 && room < 30 && bonusRoll < 0.005) room += 3;
            else if(room < 30 && bonusRoll < 0.015) room += 2;
            else room++;
            room = Math.min(room,31); 
        }
        if(room > 30){
            updateMazeTrack();
            document.getElementById("roomDisplay").innerText = "";
            document.getElementById("bossMessage").innerText = "";
            document.getElementById("mazeTrack").classList.add("victory");
            document.getElementById("mazeTrack").style.textAlign = "center";
            let timeString = Math.floor((Date.now() - startTime)/60000) + "m " + Math.floor(((Date.now() - startTime)/1000)%60) + "s";
            localStorage.removeItem("gauntletRoom");
            document.getElementById("question").innerHTML = "<h2>You have conquered the Microeconomics Gauntlet!</h2>";
            document.getElementById("answers").innerHTML="";
            document.getElementById("message").innerHTML = `<strong>User:</strong> ${username}<br><strong>Time:</strong> ${timeString}<br><strong>Code:</strong> <span style='color:#fbbf24; font-size:20px;'>${generateCode()}</span><br><br>Enter this into Canvas.`;
            return;
        }
        document.getElementById("message").innerText="Correct!";
    } else {
        let setback = (diff==="easy" || diff==="easyBoss") ? 3 : (diff==="medium") ? 4 : (diff==="mediumBoss") ? 5 : (diff==="hard") ? 5 : 7;
        room=Math.max(1,room-setback);
        document.getElementById("message").innerText=`Wrong! Fell back ${setback} rooms.`;
    }
    localStorage.setItem("gauntletRoom", room);
    loadQuestion();
}
loadQuestion();
</script>
</body>
</html>
